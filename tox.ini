[tox]
minversion = 2.0
envlist = py{38,39,310,311,312,313},style

[testenv]
deps = -r{toxinidir}/test-requirements.txt
commands=
    pytest

[testenv:mypy]
description =
    Run type checks.
deps =
    mypy
commands=
    mypy sphinxcontrib

[testenv:style]
description =
    Run style checks.
deps =
    flake8
    isort
commands =
    flake8 sphinxcontrib tests setup.py
